<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Своя игра</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body data-app="student">
  <div class="app-shell student-shell">
    <div id="configNotice" class="notice hidden">
      <strong>Нужно подключить Supabase.</strong>
      Заполни `supabase/config.js`, затем обнови страницу.
    </div>

    <main id="screenLobby" class="student-join-screen">
      <section class="panel join-panel join-panel-centered">
        <div class="panel-head">
          <h1>Вход в комнату</h1>
          <p>Введите код комнаты и своё имя.</p>
        </div>

        <form id="studentJoinForm" class="stack">
          <label>
            Код комнаты
            <input id="studentRoomCode" type="text" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="1234" required>
          </label>
          <label>
            Имя
            <input id="studentName" type="text" maxlength="40" placeholder="Например, Маша" required>
          </label>
          <button type="submit">Войти</button>
        </form>
      </section>
    </main>

    <main id="screenRoom" class="student-room-screen hidden">
      <section class="student-room-topbar">
        <div class="student-room-meta">
          <div class="room-code-chip" id="roomCodeLabel">----</div>
          <div>
            <h2 id="roomTitleLabel">-</h2>
            <p id="roomStatusLabel" class="muted-line">-</p>
          </div>
        </div>
        <button id="signOutButton" class="icon-button hidden" type="button" title="Выйти" aria-label="Выйти">⎋</button>
      </section>

      <section class="panel question-panel">
        <div class="question-card">
          <p class="eyebrow">Текущий вопрос</p>
          <h3 id="questionPromptLabel">Вопрос ещё не открыт</h3>
          <p id="questionMetaLabel" class="question-meta">Ожидание ведущего</p>
        </div>

        <form id="studentAnswerForm" class="stack hidden">
          <label>
            Ваш ответ
            <textarea id="studentAnswerInput" rows="4" maxlength="500" placeholder="Введите ответ"></textarea>
          </label>
          <button type="submit">Отправить ответ</button>
        </form>

        <div id="studentAnswerState" class="notice subtle hidden"></div>
      </section>

      <section class="student-board-layout">
        <section class="panel board-panel board-panel-dominant">
          <div class="board-frame">
            <div id="circles-container"></div>
          </div>
        </section>

        <aside class="panel leaderboard-panel">
          <div class="panel-head">
            <h2>Таблица</h2>
            <p>До 11 учеников в комнате.</p>
          </div>
          <div id="leaderboardList" class="leaderboard-list"></div>
        </aside>
      </section>
    </main>
  </div>

  <script type="module" src="src/script.js"></script>
</body>
</html>
