<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Своя игра · Экран</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-app="projector">
  <div class="app-shell projector-shell">
    <div id="configNotice" class="notice hidden">
      <strong>Нужно подключить Supabase.</strong>
      Заполни `supabase-config.js`, затем обнови страницу.
    </div>

    <main id="screenLobby" class="student-join-screen">
      <section class="panel join-panel join-panel-centered">
        <div class="panel-head">
          <h1>Экран комнаты</h1>
          <p>Введите код комнаты для режима наблюдателя.</p>
        </div>

        <form id="projectorJoinForm" class="stack">
          <label>
            Код комнаты
            <input id="projectorRoomCode" type="text" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="1234" required>
          </label>
          <button type="submit">Открыть экран</button>
        </form>
      </section>
    </main>

    <main id="screenRoom" class="projector-room-screen hidden">
      <section class="student-room-topbar">
        <div class="student-room-meta">
          <div class="room-code-chip" id="roomCodeLabel">----</div>
          <div>
            <h2 id="roomTitleLabel">-</h2>
            <p id="roomStatusLabel" class="muted-line">-</p>
          </div>
        </div>
      </section>

      <section class="panel question-panel projector-question-panel">
        <div class="question-card">
          <p class="eyebrow">Текущий вопрос</p>
          <h3 id="questionPromptLabel">Вопрос ещё не открыт</h3>
          <p id="questionMetaLabel" class="question-meta">Ожидание ведущего</p>
        </div>
      </section>

      <section class="projector-board-layout">
        <section class="panel board-panel board-panel-dominant">
          <div class="board-frame">
            <div id="circles-container"></div>
          </div>
        </section>

        <aside class="panel leaderboard-panel">
          <div class="panel-head">
            <h2>Таблица</h2>
            <p>Проекционный экран комнаты.</p>
          </div>
          <div id="leaderboardList" class="leaderboard-list"></div>
        </aside>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
